# TODO: expand with additional controls — this is a minimum-viable starter library.
# Contribute additions via PR; engine validates the schema at load time.
domain: government
version: "1.0"
source_framework: "FISMA Moderate + NIST 800-53 Rev 5"
controls:
  - id: CTRL-GOV-001
    title: Account Management (AC-2)
    category: access_control
    verification_kinds: [policy_inspection, design_review]
    minimum_evidence:
      - "Account lifecycle documented (provisioning, modification, disablement)"
      - "Privileged-account review cadence defined"
    regulatory_anchor:
      framework: "NIST SP 800-53 Rev 5"
      clause: "AC-2"

  - id: CTRL-GOV-002
    title: Audit Events (AU-2)
    category: audit_logging
    verification_kinds: [audit_log_inspection, design_review]
    minimum_evidence:
      - "Audit event catalog enumerates each event type and rationale"
      - "Log retention and review procedure documented"
    regulatory_anchor:
      framework: "NIST SP 800-53 Rev 5"
      clause: "AU-2"

  - id: CTRL-GOV-003
    title: Cryptographic Protection (SC-13)
    category: encryption
    verification_kinds: [config_inspection, test]
    minimum_evidence:
      - "Cryptographic module list references FIPS 140-3 validation"
      - "Test case verifies only approved algorithms are accepted"
    regulatory_anchor:
      framework: "NIST SP 800-53 Rev 5"
      clause: "SC-13"

  - id: CTRL-GOV-004
    title: Incident Handling (IR-4)
    category: incident_response
    verification_kinds: [policy_inspection, design_review]
    minimum_evidence:
      - "Incident-response plan covers preparation, detection, analysis, containment, eradication, and recovery"
      - "Tabletop exercise schedule documented"
    regulatory_anchor:
      framework: "NIST SP 800-53 Rev 5"
      clause: "IR-4"
