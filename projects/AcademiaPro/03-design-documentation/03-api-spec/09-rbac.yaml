openapi: "3.1.0"
info:
  title: Academia Pro — RBAC and User Management API
  version: "1.0.0"
  description: >
    User, role, and permission management endpoints. Covers FR-RBAC-001
    through FR-RBAC-005.
    Role assignment is per-school (BR-RBAC-001). No user may assign a role
    with higher privilege than their own (BR-RBAC-002).
    All endpoints are tenant-scoped via AuthenticateTenant middleware (BR-MT-001).

paths:

  /users:
    get:
      operationId: listUsers
      summary: List users in the tenant (FR-RBAC-001)
      tags: [RBAC]
      security:
        - BearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [school_owner, head_teacher, class_teacher, bursar, receptionist, librarian, transport_manager, hostel_warden, parent, student]
        - name: q
          in: query
          schema:
            type: string
          description: Search by name or email.
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        "200":
          description: Paginated user list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /users/invite:
    post:
      operationId: inviteUser
      summary: Invite a new user and assign a role (FR-RBAC-003)
      description: >
        Sends an invitation email to the specified address. If the email is not
        yet registered on the platform, a pending account is created. The
        invited user must set their password via the link in the invitation email.
        The inviting user may not assign a role with higher privilege than their
        own (BR-RBAC-002).
      tags: [RBAC]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserRequest"
      responses:
        "201":
          description: Invitation sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      invitation_id:
                        type: integer
                      email:
                        type: string
                        format: email
                      role:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
        "403":
          description: Caller attempted to assign a role with higher privilege than their own (BR-RBAC-002).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: PRIVILEGE_ESCALATION
                  message: You may not assign a role with higher privilege than your own.
        "409":
          description: User already has an active role at this school.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /users/{id}:
    get:
      operationId: getUser
      summary: Get user profile and role details
      tags: [RBAC]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/role:
    patch:
      operationId: changeUserRole
      summary: Change a user's role (FR-RBAC-002)
      description: >
        Updates the user's role at the current school. The caller may not
        assign a role with higher privilege than their own (BR-RBAC-002).
        The change is logged to audit_logs.
      tags: [RBAC]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [head_teacher, class_teacher, bursar, receptionist, librarian, transport_manager, hostel_warden, parent, student]
                reason:
                  type: string
                  maxLength: 300
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/User"
        "403":
          description: Privilege escalation attempt (BR-RBAC-002).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/deactivate:
    post:
      operationId: deactivateUser
      summary: Deactivate a user account at this school (FR-RBAC-001)
      description: >
        Revokes the user's access to the current school. The user's account
        remains active on the platform (they may still access other schools).
        All active sessions for this user at this school are invalidated.
      tags: [RBAC]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 300
      responses:
        "200":
          description: User deactivated at this school.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/sessions:
    delete:
      operationId: revokeUserSessions
      summary: Revoke all active sessions for a user (FR-RBAC-004)
      description: >
        Revokes all Sanctum tokens for the specified user at the current
        school. Used when a user account is compromised or when a staff member
        leaves. The user must re-authenticate to regain access.
      tags: [RBAC]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: All sessions revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      tokens_revoked:
                        type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /permissions:
    get:
      operationId: getEffectivePermissions
      summary: Get effective permissions for the authenticated user (FR-RBAC-001)
      description: >
        Returns the full list of permissions the authenticated user holds at the
        current tenant, resolved from their role. Clients should cache this
        response and use it to drive UI visibility decisions.
      tags: [RBAC]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Effective permission set.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      role:
                        type: string
                        example: bursar
                      permissions:
                        type: array
                        items:
                          type: string
                        example:
                          - students.view
                          - fees.record_payment
                          - fees.view_reports
                          - attendance.view

  /audit-logs/super-admin:
    get:
      operationId: listSuperAdminAuditLog
      summary: Super Admin cross-tenant access audit log (FR-RBAC-005)
      description: >
        Returns all cross-tenant data access events by Super Admin users,
        logged per BR-MT-003. Super Admin access only.
      tags: [RBAC]
      security:
        - BearerAuth: []
      parameters:
        - name: super_admin_user_id
          in: query
          schema:
            type: integer
        - name: target_tenant_id
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        "200":
          description: Paginated audit log.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SuperAdminAuditEntry"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "403":
          description: Caller is not a Super Admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  parameters:
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: User primary key.

  schemas:

    InviteUserRequest:
      type: object
      required: [email, role, full_name]
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
          maxLength: 150
        role:
          type: string
          enum: [head_teacher, class_teacher, bursar, receptionist, librarian, transport_manager, hostel_warden, parent, student]
        class_id:
          type: integer
          nullable: true
          description: Required when role is class_teacher or student.

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        status:
          type: string
          enum: [active, inactive, invited]

    User:
      allOf:
        - $ref: "#/components/schemas/UserSummary"
        - type: object
          properties:
            phone:
              type: string
              nullable: true
            class_id:
              type: integer
              nullable: true
              description: Assigned class (class_teacher and student roles only).
            class_name:
              type: string
              nullable: true
            last_login_at:
              type: string
              format: date-time
              nullable: true
            created_at:
              type: string
              format: date-time

    SuperAdminAuditEntry:
      type: object
      properties:
        id:
          type: integer
        super_admin_user_id:
          type: integer
        super_admin_name:
          type: string
        target_tenant_id:
          type: integer
        target_tenant_name:
          type: string
        action:
          type: string
          example: SUPER_ADMIN_READ
        resource:
          type: string
          example: students
        access_reason:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        last_page:
          type: integer

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
