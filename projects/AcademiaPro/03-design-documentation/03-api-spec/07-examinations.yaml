openapi: "3.1.0"
info:
  title: Academia Pro — Examinations API
  version: "1.0.0"
  description: >
    Examination configuration, mark entry, and UNEB grading endpoints.
    Covers FR-EXM-001 through FR-EXM-008.
    Grading rules: PLE (BR-UNEB-001), UCE O-Level (BR-UNEB-002),
    UACE A-Level (BR-UNEB-003), Thematic P1–P3 (BR-UNEB-004).
    Out-of-range marks are rejected at the API layer (BR-UNEB-005).
    All endpoints are tenant-scoped via AuthenticateTenant middleware (BR-MT-001).

paths:

  /exams:
    get:
      operationId: listExams
      summary: List exams (FR-EXM-001)
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - name: academic_year_id
          in: query
          schema:
            type: integer
        - name: term
          in: query
          schema:
            type: integer
            enum: [1, 2, 3]
        - name: class_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Exam list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Exam"

    post:
      operationId: createExam
      summary: Create an exam configuration (FR-EXM-001)
      description: >
        Defines an exam for a class: name, subject scope, maximum mark, and
        weight. Multiple exams can contribute to a term aggregate.
      tags: [Examinations]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamRequest"
      responses:
        "201":
          description: Exam created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Exam"
        "422":
          $ref: "#/components/responses/ValidationError"

  /exams/{id}:
    get:
      operationId: getExam
      summary: Get exam details
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExamIdPath"
      responses:
        "200":
          description: Exam details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Exam"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateExam
      summary: Update exam configuration
      description: >
        Updating maximum_mark after marks have been entered is not permitted
        if any submitted mark would exceed the new maximum.
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExamIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamRequest"
      responses:
        "200":
          description: Exam updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Exam"
        "409":
          description: Cannot reduce maximum_mark below an existing submitted mark.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /exams/{id}/marks:
    get:
      operationId: getExamMarks
      summary: Get all marks for an exam (FR-EXM-002)
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExamIdPath"
      responses:
        "200":
          description: Mark sheet for the exam.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/MarkSheet"

    post:
      operationId: submitMarks
      summary: Submit marks for an exam (FR-EXM-002)
      description: >
        Saves marks for all students in the exam's class. Marks outside the
        configured maximum are rejected (BR-UNEB-005). Locked exams (past the
        exam_submission_deadline — BR-CAL-003) return 409 EXAM_LOCKED unless
        the Head Teacher has issued an unlock (FR-EXM-003).
        Idempotent — re-submitting overwrites existing marks.
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExamIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitMarksRequest"
      responses:
        "200":
          description: Marks saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/MarkSheet"
        "409":
          description: Exam is locked (past submission deadline or year-end lock).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: EXAM_LOCKED
                  message: Mark entry is locked for this exam. Contact the Head Teacher to request an unlock.
        "422":
          $ref: "#/components/responses/ValidationError"
          # BR-UNEB-005: out-of-range mark returns 422 with per-field error detail

  /exams/{id}/unlock:
    post:
      operationId: unlockExam
      summary: Unlock a locked exam for mark amendment (FR-EXM-003)
      description: >
        Head Teacher grants a temporary unlock window for a specific exam to
        allow mark corrections after the submission deadline. The unlock is
        time-limited and logged.
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ExamIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, unlock_until]
              properties:
                reason:
                  type: string
                  maxLength: 500
                unlock_until:
                  type: string
                  format: date-time
                  description: Datetime after which the exam re-locks automatically.
      responses:
        "200":
          description: Exam unlocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      exam_id:
                        type: integer
                      unlock_until:
                        type: string
                        format: date-time
        "403":
          description: Caller does not have the head_teacher role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /classes/{classId}/grading-results:
    get:
      operationId: getGradingResults
      summary: Get computed grading results for a class (FR-EXM-004 – FR-EXM-007)
      description: >
        Applies the appropriate UNEB grading algorithm based on the class
        curriculum_type and returns per-student grades and aggregates.
        - Thematic (P1–P3): descriptors HC/C/NYC per competency (BR-UNEB-004, FR-EXM-007).
        - Primary (P4–P6): numeric marks and percentage rank.
        - PLE (P7): 4-subject aggregate and division (BR-UNEB-001, FR-EXM-004).
        - UCE O-Level (S4): per-subject D1–F9 grade, overall division (BR-UNEB-002, FR-EXM-005).
        - UACE A-Level (S6): principal/subsidiary grades, total points (BR-UNEB-003, FR-EXM-006).
      tags: [Examinations]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
        - name: academic_year_id
          in: query
          required: true
          schema:
            type: integer
        - name: term
          in: query
          required: true
          schema:
            type: integer
            enum: [1, 2, 3]
      responses:
        "200":
          description: Grading results for all students in the class.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ClassGradingResults"
        "404":
          $ref: "#/components/responses/NotFound"

  /uneb-export:
    post:
      operationId: generateUnebExport
      summary: Generate UNEB mark export file (FR-EXM-008)
      description: >
        Generates the UNEB-formatted mark upload file for examination classes
        (P7, S4, S6). Returns a signed download URL valid for 15 minutes.
        Marks must be finalised (all students marked, no pending unlocks) before
        export is permitted.
      tags: [Examinations]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id, academic_year_id]
              properties:
                class_id:
                  type: integer
                academic_year_id:
                  type: integer
      responses:
        "200":
          description: UNEB export file generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      download_url:
                        type: string
                        format: uri
                        description: Pre-signed S3 URL, valid for 15 minutes.
                      expires_at:
                        type: string
                        format: date-time
                      student_count:
                        type: integer
        "409":
          description: Marks are not finalised — missing marks or pending unlock windows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: MARKS_NOT_FINALISED
                  message: 3 students have incomplete marks. Resolve before exporting.

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  parameters:
    ExamIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Exam primary key (tenant-scoped).

  schemas:

    CreateExamRequest:
      type: object
      required: [name, class_id, academic_year_id, term, subjects]
      properties:
        name:
          type: string
          maxLength: 100
          example: End of Term 2 Examination
        class_id:
          type: integer
        academic_year_id:
          type: integer
        term:
          type: integer
          enum: [1, 2, 3]
        subjects:
          type: array
          minItems: 1
          items:
            type: object
            required: [subject_id, maximum_mark]
            properties:
              subject_id:
                type: integer
              maximum_mark:
                type: integer
                minimum: 1
                example: 100
              weight_percent:
                type: integer
                minimum: 1
                maximum: 100
                description: >
                  Contribution of this exam to the term aggregate (%).
                  All weights for a class/term must sum to 100.
                example: 60

    Exam:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        class_id:
          type: integer
        class_name:
          type: string
        academic_year_id:
          type: integer
        term:
          type: integer
        status:
          type: string
          enum: [open, locked, unlocked]
        unlock_until:
          type: string
          format: date-time
          nullable: true
        subjects:
          type: array
          items:
            type: object
            properties:
              subject_id:
                type: integer
              subject_name:
                type: string
              maximum_mark:
                type: integer
              weight_percent:
                type: integer

    SubmitMarksRequest:
      type: object
      required: [marks]
      properties:
        marks:
          type: array
          minItems: 1
          items:
            type: object
            required: [student_enrollment_id, subject_id, score]
            properties:
              student_enrollment_id:
                type: integer
              subject_id:
                type: integer
              score:
                oneOf:
                  - type: number
                    minimum: 0
                    description: Numeric score for standard/PLE/UCE/UACE exams.
                  - type: string
                    enum: [HC, C, NYC]
                    description: Descriptor for Thematic curriculum (BR-UNEB-004).
              absent:
                type: boolean
                default: false
                description: True if the student was absent from this exam.

    MarkSheet:
      type: object
      properties:
        exam_id:
          type: integer
        exam_name:
          type: string
        class_id:
          type: integer
        submitted_by_user_id:
          type: integer
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        marks:
          type: array
          items:
            type: object
            properties:
              student_enrollment_id:
                type: integer
              student_name:
                type: string
              subject_id:
                type: integer
              subject_name:
                type: string
              score:
                nullable: true
                oneOf:
                  - type: number
                  - type: string
              absent:
                type: boolean

    ClassGradingResults:
      type: object
      properties:
        class_id:
          type: integer
        class_name:
          type: string
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        academic_year_id:
          type: integer
        term:
          type: integer
        students:
          type: array
          items:
            $ref: "#/components/schemas/StudentGradingResult"

    StudentGradingResult:
      type: object
      properties:
        student_enrollment_id:
          type: integer
        student_name:
          type: string
        class_position:
          type: integer
          nullable: true
          description: Class rank by aggregate (null for Thematic curriculum).
        aggregate:
          type: integer
          nullable: true
          description: >
            PLE: sum of 4 grades (4–36). UCE: subject aggregate points.
            UACE: total principal points. Null for Thematic and standard primary.
        division:
          type: string
          nullable: true
          example: Division I
          description: UNEB division string for PLE, UCE, and UACE results.
        subject_results:
          type: array
          items:
            type: object
            properties:
              subject_id:
                type: integer
              subject_name:
                type: string
              raw_score:
                nullable: true
                oneOf:
                  - type: number
                  - type: string
              grade:
                type: string
                nullable: true
                description: >
                  Grade per curriculum: PLE=1–4; UCE=D1–F9;
                  UACE=A/B/C/D/E/O/F; Primary=%; Thematic=HC/C/NYC.
              points:
                type: integer
                nullable: true
                description: UACE points only (A=6 … F=0).

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
