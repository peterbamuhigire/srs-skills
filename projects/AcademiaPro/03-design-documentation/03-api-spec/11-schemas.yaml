openapi: "3.1.0"
info:
  title: Academia Pro — Shared Schemas
  version: "1.0.0"
  description: >
    Shared reusable components referenced across all Academia Pro Phase 1 API specs.
    This file is included for documentation and tooling purposes — individual spec
    files declare their own inline schemas to maintain file independence for code
    generation. Canonical definitions live here for cross-spec consistency audits.

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken
      description: >
        Laravel Sanctum token. Claims stored in personal_access_tokens.abilities
        JSON column: { "tenant_id": 42, "user_id": 1007, "role": "bursar" }.
        Super Admin tokens carry "tenant_id": null and "role": "super_admin".

  schemas:

    # -----------------------------------------------------------------------
    # Envelope wrappers
    # -----------------------------------------------------------------------

    SuccessEnvelope:
      description: Standard single-object success response envelope.
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ListEnvelope:
      description: Standard paginated list success response envelope.
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    ErrorEnvelope:
      description: Standard error response envelope.
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (see Standard Error Codes in 00-index.md).
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable description of the error.
            details:
              type: object
              description: >
                Present on 422 responses only. Maps field names to arrays of
                validation error strings.
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                email: ["The email field is required."]
                role: ["The selected role is invalid."]

    # -----------------------------------------------------------------------
    # Pagination
    # -----------------------------------------------------------------------

    PaginationMeta:
      description: Pagination metadata included in all list responses.
      type: object
      required: [total, page, per_page, last_page]
      properties:
        total:
          type: integer
          description: Total count of records matching the query.
        page:
          type: integer
          description: Current page number (1-based).
        per_page:
          type: integer
          description: Number of records per page.
        last_page:
          type: integer
          description: Total number of pages.

    # -----------------------------------------------------------------------
    # Identity and authentication
    # -----------------------------------------------------------------------

    TokenPair:
      description: Access token and refresh token pair returned on login and token refresh.
      type: object
      required: [access_token, refresh_token, expires_in, token_type]
      properties:
        access_token:
          type: string
          description: Short-lived Sanctum access token (TTL 15 minutes).
        refresh_token:
          type: string
          description: Long-lived refresh token (TTL 30 days).
        expires_in:
          type: integer
          example: 900
          description: Access token TTL in seconds.
        token_type:
          type: string
          example: Bearer

    AuthUser:
      description: Authenticated user profile and tenant role.
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [super_admin, school_owner, head_teacher, class_teacher, bursar, receptionist, librarian, transport_manager, hostel_warden, parent, student]

    # -----------------------------------------------------------------------
    # Tenant
    # -----------------------------------------------------------------------

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
        plan:
          type: string
          enum: [starter, standard, premium]
        status:
          type: string
          enum: [pending, active, suspended]
        owner_email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    # -----------------------------------------------------------------------
    # Students (global and enrollment)
    # -----------------------------------------------------------------------

    GlobalStudent:
      description: >
        Global identity record in global_students table (BR-STU-001, BR-STU-002).
        No tenant_id — readable by any authenticated school, writable only by
        the owning school (BR-MT-002).
      type: object
      properties:
        student_uid:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        middle_name:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        nin:
          type: string
          nullable: true
          description: Uganda National Identification Number (age 16+).
        lin:
          type: string
          nullable: true
          description: MoES Learner Identification Number.
        active_enrollment:
          type: object
          nullable: true
          description: Present if the student has an active enrollment at any school (BR-STU-004).
          properties:
            school_name:
              type: string
            status:
              type: string
              enum: [active]

    StudentSummary:
      description: Student record as returned in list responses.
      type: object
      properties:
        id:
          type: integer
          description: School enrollment record ID (tenant-scoped).
        student_uid:
          type: string
          format: uuid
        full_name:
          type: string
        local_admission_number:
          type: string
          nullable: true
        class_name:
          type: string
        status:
          type: string
          enum: [active, inactive, transferred, graduated]

    Student:
      description: Full student record combining enrollment and global identity fields.
      allOf:
        - $ref: "#/components/schemas/StudentSummary"
        - type: object
          properties:
            first_name:
              type: string
            last_name:
              type: string
            middle_name:
              type: string
              nullable: true
            date_of_birth:
              type: string
              format: date
            gender:
              type: string
              enum: [male, female]
            nin:
              type: string
              nullable: true
            lin:
              type: string
              nullable: true
            class_id:
              type: integer
            admission_date:
              type: string
              format: date
            guardian_name:
              type: string
              nullable: true
            guardian_phone:
              type: string
              nullable: true
            guardian_relationship:
              type: string
              enum: [father, mother, guardian, other]
              nullable: true
            created_at:
              type: string
              format: date-time

    # -----------------------------------------------------------------------
    # Academic structure
    # -----------------------------------------------------------------------

    AcademicYear:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "2026"
        status:
          type: string
          enum: [draft, active, closed]
        term1_start:
          type: string
          format: date
        term1_end:
          type: string
          format: date
        term2_start:
          type: string
          format: date
        term2_end:
          type: string
          format: date
        term3_start:
          type: string
          format: date
        term3_end:
          type: string
          format: date
        exam_submission_deadline:
          type: string
          format: date
          nullable: true
        promotion_wizard_complete:
          type: boolean

    Class:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: P6 East
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        academic_year_id:
          type: integer
        promotes_to_class_id:
          type: integer
          nullable: true
        class_teacher_user_id:
          type: integer
          nullable: true
        student_count:
          type: integer

    Subject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
          nullable: true
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        is_compulsory:
          type: boolean

    # -----------------------------------------------------------------------
    # Fees
    # -----------------------------------------------------------------------

    FeeStructure:
      type: object
      properties:
        id:
          type: integer
        class_id:
          type: integer
        academic_year_id:
          type: integer
        term:
          type: integer
          enum: [1, 2, 3]
        total_amount_ugx:
          type: integer
        line_items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              description:
                type: string
              amount_ugx:
                type: integer

    PaymentReceipt:
      description: >
        Immutable payment receipt (BR-FEE-004). Receipt numbers are sequential
        per school and cannot be deleted.
      type: object
      properties:
        id:
          type: integer
        receipt_number:
          type: string
          example: RCT-2026-00147
        student_enrollment_id:
          type: integer
        amount_ugx:
          type: integer
        term:
          type: integer
        payment_method:
          type: string
          enum: [cash, bank_transfer, schoolpay]
        payment_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    # -----------------------------------------------------------------------
    # Attendance
    # -----------------------------------------------------------------------

    AttendanceStatus:
      description: Valid attendance status values (BR-ATT-001).
      type: string
      enum: [present, absent, late, excused]

    # -----------------------------------------------------------------------
    # Examinations
    # -----------------------------------------------------------------------

    CurriculumType:
      description: Uganda curriculum type driving grading algorithm selection.
      type: string
      enum: [thematic, primary, o_level, a_level]

    ThematicDescriptor:
      description: >
        Competency descriptor for Thematic Curriculum (P1–P3, BR-UNEB-004).
        HC = Highly Competent, C = Competent, NYC = Not Yet Competent.
      type: string
      enum: [HC, C, NYC]

    # -----------------------------------------------------------------------
    # Audit
    # -----------------------------------------------------------------------

    AuditLogEntry:
      description: >
        Immutable audit log record (FR-AUD-001). Records are append-only —
        no entry may be modified or deleted after creation.
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
          description: Standardised action code.
        resource_type:
          type: string
        resource_id:
          type: integer
          nullable: true
        user_id:
          type: integer
        user_name:
          type: string
        before:
          type: object
          nullable: true
          additionalProperties: true
        after:
          type: object
          nullable: true
          additionalProperties: true
        meta:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time

  # -----------------------------------------------------------------------
  # Reusable parameters
  # -----------------------------------------------------------------------

  parameters:

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number (1-based).

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Records per page. Maximum 100.

    AcademicYearIdQuery:
      name: academic_year_id
      in: query
      schema:
        type: integer
      description: Filter by academic year ID.

    TermQuery:
      name: term
      in: query
      schema:
        type: integer
        enum: [1, 2, 3]
      description: Uganda academic term (1, 2, or 3 — BR-CAL-001).

  # -----------------------------------------------------------------------
  # Reusable responses
  # -----------------------------------------------------------------------

  responses:

    ValidationError:
      description: Request body failed validation (422).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: The given data was invalid.
              details:
                email: ["The email field is required."]

    Unauthenticated:
      description: No valid authentication token provided (401).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: UNAUTHENTICATED
              message: Unauthenticated.

    Forbidden:
      description: Authenticated but insufficient permission (403).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: You do not have permission to perform this action.

    NotFound:
      description: Resource not found (404).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found.

    Conflict:
      description: State conflict — resource cannot be modified in its current state (409).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

    TenantSuspended:
      description: The school's subscription is suspended (403).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: TENANT_SUSPENDED
              message: This school account has been suspended. Contact Chwezi support.
