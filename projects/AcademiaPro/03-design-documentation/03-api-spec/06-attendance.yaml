openapi: "3.1.0"
info:
  title: Academia Pro — Attendance API
  version: "1.0.0"
  description: >
    Daily attendance endpoints. Covers FR-ATT-001 through FR-ATT-004.
    All endpoints are tenant-scoped via AuthenticateTenant middleware (BR-MT-001).
    Valid attendance statuses: present, absent, late, excused (BR-ATT-001).
    Three consecutive absences trigger an automated SMS to the guardian (BR-ATT-002).
    Amendments after 48 hours require Head Teacher role and are fully audited (BR-ATT-003).

paths:

  /attendance:
    post:
      operationId: submitAttendance
      summary: Submit daily attendance for a class (FR-ATT-001)
      description: >
        Submits attendance records for all students in a class for a single date.
        Idempotent for the same class/date combination — re-submitting overwrites
        records within the 48-hour amendment window (BR-ATT-003).
        After a successful submission the system checks for 3 consecutive absences
        per student and queues SMS alerts accordingly (BR-ATT-002).
      tags: [Attendance]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAttendanceRequest"
      responses:
        "201":
          description: Attendance recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AttendanceSubmitResult"
        "409":
          description: >
            Attendance for this class/date combination already exists and the
            48-hour amendment window has expired. Use the amendment endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: AMENDMENT_WINDOW_EXPIRED
                  message: The 48-hour self-amendment window has expired. Contact the Head Teacher.
        "422":
          $ref: "#/components/responses/ValidationError"

  /attendance/class/{classId}/date/{date}:
    get:
      operationId: getAttendanceByClassDate
      summary: Get attendance records for a class on a date (FR-ATT-001)
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
          example: "2026-04-07"
      responses:
        "200":
          description: Attendance records for the specified class and date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendanceRecord"
        "404":
          $ref: "#/components/responses/NotFound"

  /attendance/{id}/amend:
    patch:
      operationId: amendAttendanceRecord
      summary: Amend a single attendance record (FR-ATT-003)
      description: >
        Corrects the status of one attendance record. Within 48 hours, any
        class teacher may amend (BR-ATT-003). After 48 hours, only the Head
        Teacher role or above may amend. All amendments are logged with the
        amending user, original value, new value, and reason.
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Attendance record ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, reason]
              properties:
                status:
                  type: string
                  enum: [present, absent, late, excused]
                reason:
                  type: string
                  maxLength: 300
                  description: Required for all amendments; mandatory for post-48-hour amendments.
      responses:
        "200":
          description: Attendance record amended.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AttendanceRecord"
        "403":
          description: Caller does not have permission to amend this record (post-48-hour window requires Head Teacher).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /attendance/reports/monthly:
    get:
      operationId: getMonthlyAttendanceReport
      summary: Monthly attendance report (FR-ATT-004)
      description: >
        Returns per-student attendance totals for a given class and calendar
        month, broken down by status (present, absent, late, excused) and
        attendance percentage.
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: class_id
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 4
      responses:
        "200":
          description: Monthly attendance report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/MonthlyAttendanceReport"

  /attendance/reports/termly:
    get:
      operationId: getTermlyAttendanceReport
      summary: Termly attendance summary per student (FR-ATT-004)
      description: >
        Returns per-student attendance totals for a given class and term.
        Used to populate the attendance section of report cards.
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: class_id
          in: query
          required: true
          schema:
            type: integer
        - name: academic_year_id
          in: query
          required: true
          schema:
            type: integer
        - name: term
          in: query
          required: true
          schema:
            type: integer
            enum: [1, 2, 3]
      responses:
        "200":
          description: Termly attendance summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StudentTermAttendance"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  schemas:

    SubmitAttendanceRequest:
      type: object
      required: [class_id, date, records]
      properties:
        class_id:
          type: integer
        date:
          type: string
          format: date
          example: "2026-04-07"
        records:
          type: array
          minItems: 1
          items:
            type: object
            required: [student_enrollment_id, status]
            properties:
              student_enrollment_id:
                type: integer
              status:
                type: string
                enum: [present, absent, late, excused]
              note:
                type: string
                maxLength: 200
                nullable: true

    AttendanceSubmitResult:
      type: object
      properties:
        class_id:
          type: integer
        date:
          type: string
          format: date
        records_saved:
          type: integer
        absent_alerts_queued:
          type: integer
          description: Number of consecutive-absence SMS alerts queued (BR-ATT-002).

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        student_enrollment_id:
          type: integer
        student_name:
          type: string
        class_id:
          type: integer
        date:
          type: string
          format: date
        status:
          type: string
          enum: [present, absent, late, excused]
        note:
          type: string
          nullable: true
        amended_at:
          type: string
          format: date-time
          nullable: true
        amended_by_user_id:
          type: integer
          nullable: true
        amendment_reason:
          type: string
          nullable: true

    MonthlyAttendanceReport:
      type: object
      properties:
        class_id:
          type: integer
        class_name:
          type: string
        year:
          type: integer
        month:
          type: integer
        school_days:
          type: integer
          description: Total school days in the month for this tenant.
        students:
          type: array
          items:
            type: object
            properties:
              student_enrollment_id:
                type: integer
              student_name:
                type: string
              present_count:
                type: integer
              absent_count:
                type: integer
              late_count:
                type: integer
              excused_count:
                type: integer
              attendance_percent:
                type: number
                format: float
                example: 93.3

    StudentTermAttendance:
      type: object
      properties:
        student_enrollment_id:
          type: integer
        student_name:
          type: string
        school_days:
          type: integer
        present_count:
          type: integer
        absent_count:
          type: integer
        late_count:
          type: integer
        excused_count:
          type: integer
        attendance_percent:
          type: number
          format: float

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
