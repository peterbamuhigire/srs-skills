openapi: "3.1.0"
info:
  title: Academia Pro — EMIS Export and Audit Trail API
  version: "1.0.0"
  description: >
    Government EMIS data export and immutable audit trail endpoints.
    Covers FR-EMIS-001 and FR-AUD-001.
    All endpoints are tenant-scoped via AuthenticateTenant middleware (BR-MT-001).
    The audit log is append-only — no delete or update operations exist (FR-AUD-001).

paths:

  /emis/export:
    post:
      operationId: generateEmisExport
      summary: Generate MoES EMIS data export (FR-EMIS-001)
      description: >
        Generates the Ministry of Education and Sports (MoES) EMIS-formatted
        export file for the current academic year. The export covers:
        school census data, student enrolment counts by class and gender,
        attendance summary, and examination results summary.
        Returns a pre-signed S3 download URL valid for 30 minutes.
        The export format follows the MoES EMIS data dictionary — pending formal
        specification from MoES (flagged as an External Action in README.md).
      tags: [EMIS]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [academic_year_id]
              properties:
                academic_year_id:
                  type: integer
                export_format:
                  type: string
                  enum: [xlsx, csv]
                  default: xlsx
                  description: >
                    Output format. Defaults to xlsx (MoES submission standard).
                    CSV is provided for debugging only.
      responses:
        "200":
          description: EMIS export generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/EmisExportResult"
        "409":
          description: Academic year data not finalised (marks or attendance incomplete).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: DATA_NOT_FINALISED
                  message: Mark entry or attendance is incomplete for one or more classes.
        "422":
          $ref: "#/components/responses/ValidationError"

  /emis/exports:
    get:
      operationId: listEmisExports
      summary: List previous EMIS exports (FR-EMIS-001)
      description: >
        Returns the history of EMIS exports generated by this school, with
        download links for exports whose URLs are still valid (within 30 minutes
        of generation). Expired exports can be regenerated via POST /emis/export.
      tags: [EMIS]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        "200":
          description: EMIS export history.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmisExportSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: Query the tenant audit trail (FR-AUD-001)
      description: >
        Returns the immutable audit log for the current tenant.
        Records are append-only — no entry may be modified or deleted.
        Supports filtering by action type, resource, and date range.
        Head Teacher and School Owner roles may query this endpoint.
      tags: [Audit]
      security:
        - BearerAuth: []
      parameters:
        - name: action
          in: query
          schema:
            type: string
          description: >
            Filter by action code (e.g., STUDENT_ADMITTED, PAYMENT_RECORDED,
            ATTENDANCE_AMENDED, EXAM_UNLOCKED, REFUND_APPROVED, ROLE_CHANGED).
        - name: resource_type
          in: query
          schema:
            type: string
            enum: [student, payment, attendance, exam, report, user, fee_structure]
        - name: resource_id
          in: query
          schema:
            type: integer
          description: Filter by the specific resource record ID.
        - name: user_id
          in: query
          schema:
            type: integer
          description: Filter by the acting user.
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        "200":
          description: Paginated audit log.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /audit-logs/{id}:
    get:
      operationId: getAuditLogEntry
      summary: Get a single audit log entry (FR-AUD-001)
      tags: [Audit]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entry detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AuditLogEntry"
        "404":
          $ref: "#/components/responses/NotFound"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  schemas:

    EmisExportResult:
      type: object
      properties:
        export_id:
          type: integer
        academic_year_id:
          type: integer
        academic_year_name:
          type: string
          example: "2026"
        export_format:
          type: string
          enum: [xlsx, csv]
        download_url:
          type: string
          format: uri
          description: Pre-signed S3 URL, valid for 30 minutes.
        url_expires_at:
          type: string
          format: date-time
        generated_at:
          type: string
          format: date-time
        generated_by_user_id:
          type: integer
        student_count:
          type: integer
        class_count:
          type: integer

    EmisExportSummary:
      type: object
      properties:
        export_id:
          type: integer
        academic_year_name:
          type: string
        export_format:
          type: string
        generated_at:
          type: string
          format: date-time
        generated_by_name:
          type: string
        student_count:
          type: integer
        download_url:
          type: string
          format: uri
          nullable: true
          description: Null if the pre-signed URL has expired (regenerate via POST /emis/export).
        url_expires_at:
          type: string
          format: date-time
          nullable: true

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        action:
          type: string
          example: ATTENDANCE_AMENDED
          description: >
            Standardised action code. Examples: STUDENT_ADMITTED,
            STUDENT_TRANSFERRED, PAYMENT_RECORDED, RECEIPT_GENERATED,
            REFUND_INITIATED, REFUND_APPROVED, ATTENDANCE_SUBMITTED,
            ATTENDANCE_AMENDED, EXAM_MARKS_SUBMITTED, EXAM_UNLOCKED,
            REPORT_CARD_GENERATED, ROLE_CHANGED, USER_INVITED,
            USER_DEACTIVATED, SESSION_REVOKED, TENANT_ACTIVATED,
            TENANT_SUSPENDED, STUDENT_PROMOTED, EMIS_EXPORT_GENERATED.
        resource_type:
          type: string
          example: attendance
        resource_id:
          type: integer
          nullable: true
        user_id:
          type: integer
          description: The user who performed the action.
        user_name:
          type: string
        ip_address:
          type: string
          nullable: true
        before:
          type: object
          nullable: true
          description: Snapshot of the resource state before the action (JSON).
          additionalProperties: true
        after:
          type: object
          nullable: true
          description: Snapshot of the resource state after the action (JSON).
          additionalProperties: true
        meta:
          type: object
          nullable: true
          description: Additional context (e.g., amendment reason, unlock reason).
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        last_page:
          type: integer

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
