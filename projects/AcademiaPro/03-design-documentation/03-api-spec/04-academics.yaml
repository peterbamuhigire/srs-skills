openapi: "3.1.0"
info:
  title: Academia Pro — Academics API
  version: "1.0.0"
  description: >
    Academic structure endpoints. Covers FR-ACA-001 through FR-ACA-004.
    All endpoints are tenant-scoped via AuthenticateTenant middleware (BR-MT-001).

paths:

  /academic-years:
    get:
      operationId: listAcademicYears
      summary: List academic years (FR-ACA-001)
      tags: [Academics]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of academic years for the tenant.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AcademicYear"

    post:
      operationId: createAcademicYear
      summary: Create a new academic year (FR-ACA-001)
      description: >
        Creates a new academic year with 3 terms (BR-CAL-001).
        The year cannot be set to active until the Year-Start Promotion Wizard
        is completed for every class (BR-PROM-001).
      tags: [Academics]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAcademicYearRequest"
      responses:
        "201":
          description: Academic year created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AcademicYear"
        "409":
          description: An active academic year already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /academic-years/{id}:
    get:
      operationId: getAcademicYear
      summary: Get academic year details
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcademicYearIdPath"
      responses:
        "200":
          description: Academic year details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/AcademicYear"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateAcademicYear
      summary: Update academic year status or term dates
      description: >
        May set status to active (triggers Promotion Wizard check — BR-PROM-001)
        or closed. Updating term dates is only permitted while the year is in
        draft status.
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcademicYearIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAcademicYearRequest"
      responses:
        "200":
          description: Academic year updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/AcademicYear"
        "409":
          description: Promotion Wizard not completed — cannot activate year.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: PROMOTION_WIZARD_INCOMPLETE
                  message: All classes must be resolved in the Promotion Wizard before activating a new year.
        "422":
          $ref: "#/components/responses/ValidationError"

  /academic-years/{id}/promotion-wizard:
    get:
      operationId: getPromotionWizardStatus
      summary: Get Promotion Wizard state for all classes (BR-PROM-001)
      description: >
        Returns the promotion status of every class for this academic year.
        Statuses: pending, promoted, departed, skipped.
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcademicYearIdPath"
      responses:
        "200":
          description: Promotion wizard class statuses.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PromotionClassStatus"

    post:
      operationId: submitPromotionWizard
      summary: Submit promotion decisions for a class (BR-PROM-001 – BR-PROM-007)
      description: >
        Records bulk promotion decisions for one class. Each student is either
        promoted to the destination class or flagged as repeating. Final-year
        classes use action=departed for all students. Creates a promotion_events
        audit record (BR-PROM-006).
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AcademicYearIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionWizardSubmit"
      responses:
        "200":
          description: Promotion decisions recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/PromotionWizardResult"
        "422":
          $ref: "#/components/responses/ValidationError"

  /classes:
    get:
      operationId: listClasses
      summary: List classes for the current academic year (FR-ACA-002)
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - name: academic_year_id
          in: query
          schema:
            type: integer
          description: Filter by academic year. Defaults to the active year.
      responses:
        "200":
          description: Class list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Class"

    post:
      operationId: createClass
      summary: Create a class or stream (FR-ACA-002)
      tags: [Academics]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: Class created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Class"
        "422":
          $ref: "#/components/responses/ValidationError"

  /classes/{id}:
    get:
      operationId: getClass
      summary: Get class details
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClassIdPath"
      responses:
        "200":
          description: Class details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Class"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateClass
      summary: Update class configuration
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClassIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassRequest"
      responses:
        "200":
          description: Class updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Class"
        "422":
          $ref: "#/components/responses/ValidationError"

  /subjects:
    get:
      operationId: listSubjects
      summary: List subjects for the tenant (FR-ACA-003)
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - name: curriculum_type
          in: query
          schema:
            type: string
            enum: [thematic, primary, o_level, a_level]
      responses:
        "200":
          description: Subject list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Subject"

    post:
      operationId: createSubject
      summary: Create a subject (FR-ACA-003)
      tags: [Academics]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectRequest"
      responses:
        "201":
          description: Subject created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Subject"
        "422":
          $ref: "#/components/responses/ValidationError"

  /timetables:
    get:
      operationId: listTimetables
      summary: List timetable entries (FR-ACA-004)
      tags: [Academics]
      security:
        - BearerAuth: []
      parameters:
        - name: class_id
          in: query
          required: true
          schema:
            type: integer
        - name: academic_year_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Timetable for the specified class.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimetableEntry"

    post:
      operationId: upsertTimetable
      summary: Create or replace timetable for a class (FR-ACA-004)
      description: >
        Replaces all timetable entries for the specified class. Accepts an array
        of period objects covering the full week. Idempotent — re-submitting
        overwrites previous entries.
      tags: [Academics]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTimetableRequest"
      responses:
        "200":
          description: Timetable saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimetableEntry"
        "422":
          $ref: "#/components/responses/ValidationError"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  parameters:
    AcademicYearIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Academic year primary key (tenant-scoped).
    ClassIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Class primary key (tenant-scoped).

  schemas:

    CreateAcademicYearRequest:
      type: object
      required: [name, term1_start, term1_end, term2_start, term2_end, term3_start, term3_end]
      properties:
        name:
          type: string
          example: "2026"
        term1_start:
          type: string
          format: date
          example: "2026-02-02"
        term1_end:
          type: string
          format: date
          example: "2026-04-10"
        term2_start:
          type: string
          format: date
          example: "2026-06-01"
        term2_end:
          type: string
          format: date
          example: "2026-08-08"
        term3_start:
          type: string
          format: date
          example: "2026-09-07"
        term3_end:
          type: string
          format: date
          example: "2026-11-20"
        exam_submission_deadline:
          type: string
          format: date
          description: >
            Deadline after which mark entry for examination classes is locked
            (BR-CAL-003).
          example: "2026-11-10"

    UpdateAcademicYearRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, closed]
        term1_start:
          type: string
          format: date
        term1_end:
          type: string
          format: date
        term2_start:
          type: string
          format: date
        term2_end:
          type: string
          format: date
        term3_start:
          type: string
          format: date
        term3_end:
          type: string
          format: date
        exam_submission_deadline:
          type: string
          format: date

    AcademicYear:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "2026"
        status:
          type: string
          enum: [draft, active, closed]
        term1_start:
          type: string
          format: date
        term1_end:
          type: string
          format: date
        term2_start:
          type: string
          format: date
        term2_end:
          type: string
          format: date
        term3_start:
          type: string
          format: date
        term3_end:
          type: string
          format: date
        exam_submission_deadline:
          type: string
          format: date
          nullable: true
        promotion_wizard_complete:
          type: boolean
          description: True when all classes have a resolved promotion status.

    PromotionClassStatus:
      type: object
      properties:
        class_id:
          type: integer
        class_name:
          type: string
          example: P6 East
        student_count:
          type: integer
        promotion_status:
          type: string
          enum: [pending, promoted, departed, skipped]
        promotes_to_class_id:
          type: integer
          nullable: true
        promotes_to_class_name:
          type: string
          nullable: true

    PromotionWizardSubmit:
      type: object
      required: [class_id, decisions]
      properties:
        class_id:
          type: integer
        decisions:
          type: array
          items:
            type: object
            required: [student_enrollment_id, action]
            properties:
              student_enrollment_id:
                type: integer
              action:
                type: string
                enum: [promote, repeat, depart]
              departure_reason:
                type: string
                enum: [completed, transferred_platform, transferred_external, scholarship, expelled, withdrawn, deceased, other]
                description: Required when action is depart (BR-DEPART-001).

    PromotionWizardResult:
      type: object
      properties:
        class_id:
          type: integer
        promoted_count:
          type: integer
        repeating_count:
          type: integer
        departed_count:
          type: integer
        promotion_event_id:
          type: integer

    CreateClassRequest:
      type: object
      required: [name, curriculum_type, academic_year_id]
      properties:
        name:
          type: string
          maxLength: 50
          example: P6 East
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        academic_year_id:
          type: integer
        promotes_to_class_id:
          type: integer
          nullable: true
          description: >
            Destination class for year-end promotion (BR-PROM-002). Null for
            final-year classes (P7, S4, S6).
        class_teacher_user_id:
          type: integer
          nullable: true

    UpdateClassRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        promotes_to_class_id:
          type: integer
          nullable: true
        class_teacher_user_id:
          type: integer
          nullable: true

    Class:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: P6 East
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        academic_year_id:
          type: integer
        promotes_to_class_id:
          type: integer
          nullable: true
        promotes_to_class_name:
          type: string
          nullable: true
        class_teacher_user_id:
          type: integer
          nullable: true
        student_count:
          type: integer

    CreateSubjectRequest:
      type: object
      required: [name, curriculum_type]
      properties:
        name:
          type: string
          maxLength: 100
          example: Mathematics
        code:
          type: string
          maxLength: 20
          example: MTH
        curriculum_type:
          type: string
          enum: [thematic, primary, o_level, a_level]
        is_compulsory:
          type: boolean
          default: false

    Subject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
          nullable: true
        curriculum_type:
          type: string
        is_compulsory:
          type: boolean

    UpsertTimetableRequest:
      type: object
      required: [class_id, academic_year_id, periods]
      properties:
        class_id:
          type: integer
        academic_year_id:
          type: integer
        periods:
          type: array
          items:
            type: object
            required: [day_of_week, period_number, subject_id, start_time, end_time]
            properties:
              day_of_week:
                type: integer
                minimum: 1
                maximum: 5
                description: 1=Monday, 5=Friday.
              period_number:
                type: integer
                minimum: 1
              subject_id:
                type: integer
              teacher_user_id:
                type: integer
                nullable: true
              start_time:
                type: string
                pattern: "^([0-1]\\d|2[0-3]):[0-5]\\d$"
                example: "08:00"
              end_time:
                type: string
                pattern: "^([0-1]\\d|2[0-3]):[0-5]\\d$"
                example: "08:45"
              room:
                type: string
                maxLength: 50
                nullable: true

    TimetableEntry:
      type: object
      properties:
        id:
          type: integer
        class_id:
          type: integer
        day_of_week:
          type: integer
        period_number:
          type: integer
        subject_id:
          type: integer
        subject_name:
          type: string
        teacher_user_id:
          type: integer
          nullable: true
        teacher_name:
          type: string
          nullable: true
        start_time:
          type: string
        end_time:
          type: string
        room:
          type: string
          nullable: true

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
