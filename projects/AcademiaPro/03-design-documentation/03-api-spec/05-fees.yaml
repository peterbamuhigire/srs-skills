openapi: "3.1.0"
info:
  title: Academia Pro — Fees Management API
  version: "1.0.0"
  description: >
    Fee structure and payment endpoints. Covers FR-FEE-001 through FR-FEE-007.
    All endpoints are tenant-scoped via AuthenticateTenant middleware (BR-MT-001).
    Fee structures are per class per term (BR-FEE-001). Partial payments are
    accepted with no minimum floor (BR-FEE-002).

paths:

  /fee-structures:
    get:
      operationId: listFeeStructures
      summary: List fee structures (FR-FEE-001)
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - name: academic_year_id
          in: query
          schema:
            type: integer
        - name: term
          in: query
          schema:
            type: integer
            enum: [1, 2, 3]
        - name: class_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Fee structure list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeeStructure"

    post:
      operationId: createFeeStructure
      summary: Create a fee structure for a class/term (FR-FEE-001)
      description: >
        Defines the fee components (tuition, development, etc.) for a specific
        class and term. A class may have multiple line items within one structure.
      tags: [Fees]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeStructureRequest"
      responses:
        "201":
          description: Fee structure created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/FeeStructure"
        "409":
          description: Fee structure already exists for this class/term combination.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /fee-structures/{id}:
    get:
      operationId: getFeeStructure
      summary: Get fee structure details
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FeeStructureIdPath"
      responses:
        "200":
          description: Fee structure details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/FeeStructure"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateFeeStructure
      summary: Update fee structure line items
      description: >
        Replaces all line items for this fee structure. Only permitted while the
        corresponding term has not yet opened. Once the term is active, the
        structure is locked for editing.
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FeeStructureIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeStructureRequest"
      responses:
        "200":
          description: Fee structure updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/FeeStructure"
        "409":
          description: Term is already active — fee structure is locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          $ref: "#/components/responses/ValidationError"

  /students/{studentId}/fee-account:
    get:
      operationId: getStudentFeeAccount
      summary: Get student fee balance and payment history (FR-FEE-006)
      description: >
        Returns the student's current balance, arrears from prior terms
        (BR-FEE-003), and payment history for the current academic year.
        Amounts are in Uganda Shillings (UGX).
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
          description: School enrollment record ID.
        - name: academic_year_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Student fee account summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/StudentFeeAccount"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments:
    post:
      operationId: recordPayment
      summary: Record a manual payment (FR-FEE-002)
      description: >
        Records a cash or bank-transfer payment made outside the platform.
        Generates a sequential receipt automatically (BR-FEE-004).
        Detects duplicate payments within a 5-minute window (BR-FEE-005).
        Partial payments are accepted (BR-FEE-002).
      tags: [Fees]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentRequest"
      responses:
        "201":
          description: Payment recorded and receipt generated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/PaymentReceipt"
        "409":
          description: Duplicate payment detected (BR-FEE-005).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                success: false
                error:
                  code: DUPLICATE_PAYMENT
                  message: This payment was already recorded within the last 5 minutes.
                  existing_receipt_number: "RCT-2026-00147"
        "422":
          $ref: "#/components/responses/ValidationError"

  /payments/{id}/receipt:
    get:
      operationId: getReceipt
      summary: Get payment receipt (FR-FEE-003)
      description: >
        Returns receipt details. Receipts are immutable and cannot be deleted
        (BR-FEE-004).
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Payment record ID.
      responses:
        "200":
          description: Receipt details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/PaymentReceipt"
        "404":
          $ref: "#/components/responses/NotFound"

  /fee-reminders/send:
    post:
      operationId: sendFeeReminders
      summary: Manually trigger fee reminder SMS (FR-FEE-004)
      description: >
        Sends an SMS reminder to all parents/guardians with an outstanding
        balance for the specified term. Automated reminders fire at D-7, D-1,
        and D+7 relative to term open date (BR-FEE-006). This endpoint allows
        a manual trigger in addition to the automated schedule.
      tags: [Fees]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [academic_year_id, term]
              properties:
                academic_year_id:
                  type: integer
                term:
                  type: integer
                  enum: [1, 2, 3]
                class_ids:
                  type: array
                  items:
                    type: integer
                  description: Limit reminders to specific classes. Omit to target all classes.
      responses:
        "200":
          description: Reminders queued for dispatch.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      queued_count:
                        type: integer
                        description: Number of SMS messages queued.

  /refunds:
    post:
      operationId: initiateRefund
      summary: Initiate a refund request (FR-FEE-005)
      description: >
        The bursar initiates a refund request. Requires approval by the School
        Owner/Director role before funds are returned (BR-FEE-007). Creates a
        refund record with status pending_approval.
      tags: [Fees]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateRefundRequest"
      responses:
        "201":
          description: Refund request created, pending approval.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Refund"
        "422":
          $ref: "#/components/responses/ValidationError"

  /refunds/{id}/approve:
    post:
      operationId: approveRefund
      summary: Approve a pending refund (FR-FEE-005, BR-FEE-007)
      description: >
        School Owner/Director approves the refund. Sets status to approved and
        records the approval timestamp and approving user. Only the
        school_owner or director role may call this endpoint.
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Refund approved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Refund"
        "403":
          description: Caller does not have the school_owner or director role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Refund is not in pending_approval status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /fee-reports/collection-summary:
    get:
      operationId: getFeeCollectionSummary
      summary: Fee collection summary report (FR-FEE-007)
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - name: academic_year_id
          in: query
          required: true
          schema:
            type: integer
        - name: term
          in: query
          schema:
            type: integer
            enum: [1, 2, 3]
          description: Omit to aggregate all terms.
      responses:
        "200":
          description: Collection summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/CollectionSummary"

  /fee-reports/defaulters:
    get:
      operationId: getDefaultersList
      summary: Defaulters list (FR-FEE-007)
      description: >
        Returns students with an outstanding balance for the specified term,
        sorted by outstanding amount descending.
      tags: [Fees]
      security:
        - BearerAuth: []
      parameters:
        - name: academic_year_id
          in: query
          required: true
          schema:
            type: integer
        - name: term
          in: query
          required: true
          schema:
            type: integer
            enum: [1, 2, 3]
        - name: class_id
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
      responses:
        "200":
          description: Defaulters list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DefaulterEntry"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SanctumToken

  parameters:
    FeeStructureIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Fee structure primary key (tenant-scoped).

  schemas:

    CreateFeeStructureRequest:
      type: object
      required: [class_id, academic_year_id, term, line_items]
      properties:
        class_id:
          type: integer
        academic_year_id:
          type: integer
        term:
          type: integer
          enum: [1, 2, 3]
        line_items:
          type: array
          minItems: 1
          items:
            type: object
            required: [description, amount_ugx]
            properties:
              description:
                type: string
                maxLength: 100
                example: Tuition Fee
              amount_ugx:
                type: integer
                minimum: 0
                description: Amount in Uganda Shillings (no decimal).
                example: 450000

    FeeStructure:
      type: object
      properties:
        id:
          type: integer
        class_id:
          type: integer
        class_name:
          type: string
        academic_year_id:
          type: integer
        term:
          type: integer
        total_amount_ugx:
          type: integer
        line_items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              description:
                type: string
              amount_ugx:
                type: integer

    StudentFeeAccount:
      type: object
      properties:
        student_id:
          type: integer
        student_name:
          type: string
        academic_year_id:
          type: integer
        current_term_billed_ugx:
          type: integer
        current_term_paid_ugx:
          type: integer
        current_term_balance_ugx:
          type: integer
        arrears_ugx:
          type: integer
          description: Outstanding balance from prior terms (BR-FEE-003).
        total_outstanding_ugx:
          type: integer
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentSummary"

    PaymentSummary:
      type: object
      properties:
        id:
          type: integer
        receipt_number:
          type: string
        amount_ugx:
          type: integer
        term:
          type: integer
        payment_method:
          type: string
          enum: [cash, bank_transfer, schoolpay]
        payment_date:
          type: string
          format: date
        recorded_by:
          type: string

    RecordPaymentRequest:
      type: object
      required: [student_enrollment_id, amount_ugx, payment_date, term, academic_year_id, payment_method]
      properties:
        student_enrollment_id:
          type: integer
        amount_ugx:
          type: integer
          minimum: 1
        payment_date:
          type: string
          format: date
        term:
          type: integer
          enum: [1, 2, 3]
        academic_year_id:
          type: integer
        payment_method:
          type: string
          enum: [cash, bank_transfer]
        reference:
          type: string
          maxLength: 100
          description: Bank reference number or receipt stub number (optional).
        note:
          type: string
          maxLength: 300

    PaymentReceipt:
      type: object
      properties:
        id:
          type: integer
        receipt_number:
          type: string
          description: Sequential receipt number per school (BR-FEE-004).
          example: RCT-2026-00147
        student_enrollment_id:
          type: integer
        student_name:
          type: string
        amount_ugx:
          type: integer
        term:
          type: integer
        academic_year_id:
          type: integer
        payment_method:
          type: string
        reference:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        recorded_by_user_id:
          type: integer
        recorded_by_name:
          type: string
        payment_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    InitiateRefundRequest:
      type: object
      required: [payment_id, amount_ugx, reason]
      properties:
        payment_id:
          type: integer
          description: Original payment record ID.
        amount_ugx:
          type: integer
          minimum: 1
        reason:
          type: string
          maxLength: 500

    Refund:
      type: object
      properties:
        id:
          type: integer
        payment_id:
          type: integer
        amount_ugx:
          type: integer
        reason:
          type: string
        status:
          type: string
          enum: [pending_approval, approved, rejected]
        initiated_by_user_id:
          type: integer
        approved_by_user_id:
          type: integer
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CollectionSummary:
      type: object
      properties:
        academic_year_id:
          type: integer
        term:
          type: integer
          nullable: true
        total_billed_ugx:
          type: integer
        total_collected_ugx:
          type: integer
        total_outstanding_ugx:
          type: integer
        collection_rate_percent:
          type: number
          format: float
          example: 78.4
        by_class:
          type: array
          items:
            type: object
            properties:
              class_id:
                type: integer
              class_name:
                type: string
              billed_ugx:
                type: integer
              collected_ugx:
                type: integer
              outstanding_ugx:
                type: integer

    DefaulterEntry:
      type: object
      properties:
        student_enrollment_id:
          type: integer
        student_name:
          type: string
        local_admission_number:
          type: string
        class_name:
          type: string
        outstanding_ugx:
          type: integer
        guardian_phone:
          type: string
          nullable: true

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        last_page:
          type: integer

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
