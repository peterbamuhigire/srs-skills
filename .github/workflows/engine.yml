name: Engine
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=engine --cov-fail-under=90
      - run: python scripts/validate_engine.py
      - run: python -m engine validate-skills
      - name: Demo passes
        run: python -m engine validate projects/_demo-hybrid-regulated
      - name: Demo fails when sabotaged
        run: |
          if python -m engine validate projects/_demo-hybrid-regulated --break-something; then
            echo "Sabotaged demo unexpectedly passed" >&2
            exit 1
          fi
